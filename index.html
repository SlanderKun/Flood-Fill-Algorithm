<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood fill algorithm</title>
    <link href="./reset-style.css" rel="stylesheet" />
    <link href="./index.css" rel="stylesheet" />
    <script src="./index.js" ></script>
</head>
<body>
    <div class="appContainer">
        <header id="header">
            <div class="header__wrapper">
                <h1 class="headerTitle">Flood fill app</h1>
                <div class="buttonContainer__wrapper">
                    <div class="buttonContainer">
                        <div class="buttonContainer__input">
                            <h3>Cord x:</h3>
                            <label class="buttonContainer__input__label">
                                <input oninput="this.value = Math.round(this.value);" type="number" class="floodCordInput">
                            </label>
                        </div>
                        <div class="buttonContainer__input">
                            <h3>Cord y:</h3>
                            <label class="buttonContainer__input__label">
                                <input oninput="this.value = Math.round(this.value);" type="number" class="floodCordInput">
                            </label>
                        </div>
                        <div class="buttonContainer__input">
                            <h3>New color:</h3>
                            <label>
                                <input class="floodColorPicker" type="color">
                            </label>
                        </div>
                    </div>
                    <div class="submitButtonContainer">
                        <input value="Generate" type="submit">
                    </div>
                </div>
                <div class="separator"></div>
                <div class="headerHideButton">
                    <svg viewBox="0 0 17 17" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
                        <path d="M16.354 11.896l-0.707 0.707-7.147-7.146-7.146 7.146-0.707-0.707 7.853-7.853 7.854 7.853z" fill="#000000" />
                    </svg>
                </div>
            </div>
        </header>
        <main>
            <section class="displaySection">

            </section>
        </main>
        <footer></footer>
    </div>
</body>
</html>
